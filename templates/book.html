<!DOCTYPE html>
<html>

<head>

    <title>Book Ticket</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f4f4;
        }

        .container {
            max-width: 500px;
            margin-top: 80px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="card shadow p-4">

            <h3 class="mb-3">Book Ticket</h3>

            <h5 class="text-danger">{{ movie.title }}</h5>

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label>Name</label>

                    <input type="text" name="name" class="form-control" required>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input type="email" name="email" class="form-control" required>

                </div>

                <div class="mb-3">

                    <label>Seat Number</label>

                    <input type="text" name="seat" class="form-control" placeholder="Example: A1" required>

                </div>

                <button class="btn btn-danger w-100">
                    Confirm Booking
                </button>

            </form>

        </div>

    </div>

</body>

</html>
