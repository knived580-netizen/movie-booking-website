<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing Payment... | MovieBooking</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0d0d0f;
            --text-color: #ffffff;
            --accent-green: #10B981;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .processing-card {
            background: #15151a;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            text-align: center;
        }

        .spinner-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
        }

        /* Custom double spinner */
        .spinner-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: var(--accent-green);
            animation: spin 1.5s linear infinite;
        }

        .spinner-ring-inner {
            position: absolute;
            top: 15%;
            left: 15%;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-bottom-color: #0ea171;
            animation: spin 1s linear infinite reverse;
        }

        .spinner-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.2);
            font-size: 1.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-title { font-weight: 800; font-size: 1.6rem; margin-bottom: 10px; color: #fff; }
        .status-desc { color: #888; font-size: 0.95rem; line-height: 1.5; }
        .secure-badge { margin-top: 30px; font-size: 0.85rem; color: #555; display: flex; align-items: center; justify-content: center; gap: 8px; }

    </style>
</head>
<body>

    <div class="processing-card">
        
        <div class="spinner-wrapper">
            <div class="spinner-ring"></div>
            <div class="spinner-ring-inner"></div>
            <i class="fa-solid fa-shield-halved spinner-icon"></i>
        </div>

        <h3 class="status-title">Processing Payment...</h3>
        <p class="status-desc">Please wait while we securely confirm your payment with the bank. Do not refresh or close this page.</p>

        <div class="secure-badge">
            <i class="fa-solid fa-lock"></i> 256-bit Encrypted Connection
        </div>

        <form id="confirm-form" method="post" action="{% url 'confirm_payment' booking.ticket_id %}">
            {% csrf_token %}
        </form>
    </div>

    <script>
        // Simulate a 3 second delay while "communicating" with the bank, then submit the confirmation
        setTimeout(() => {
            document.getElementById('confirm-form').submit();
        }, 3000);
    </script>
</body>
</html>
