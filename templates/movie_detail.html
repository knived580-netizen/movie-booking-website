<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }} | Book Tickets</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0d0d0f;
            --text-color: #ffffff;
            --accent-red: #E50914;
            --accent-hover: #b8050e;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            margin-bottom: 50px;
        }

        /* Glassmorphic Navbar */
        .navbar-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 26px;
            letter-spacing: 1px;
            color: #fff !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .navbar-brand i { color: var(--accent-red); }

        /* Specific Page Styles */
        .poster { 
            height: 500px; 
            object-fit: cover; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid var(--glass-border);
        }
        
        .movie-title { font-weight: 800; font-size: 3.5rem; letter-spacing: -1px; margin-bottom: 10px; }
        .metadata { color: #aaa; font-size: 1.1rem; gap: 15px; display: flex; align-items: center; margin-bottom: 25px; }
        .metadata i { color: var(--accent-red); margin-right: 5px; }
        
        .synopsis-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            line-height: 1.7;
            color: #ccc;
            margin-bottom: 30px;
        }

        .btn-book {
            background-color: var(--accent-red);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-book:hover {
            background-color: var(--accent-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.4);
            color: #fff;
        }
        
        .btn-back {
            color: #aaa;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .btn-back:hover { color: #fff; transform: translateX(-5px); }
    </style>
</head>
<body>

    <!-- Transparent Navbar -->
    <nav class="navbar navbar-glass mb-5">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fa-solid fa-ticket"></i> CineBook
            </a>
        </div>
    </nav>

    <div class="container">
        <a href="{% url 'home' %}" class="btn-back"><i class="fa-solid fa-arrow-left mt-2"></i> Back to Movies</a>
        
        <div class="row align-items-center">
            <div class="col-md-5 col-lg-4 mb-4 mb-md-0">
                {% if movie.poster %}
                <img src="{{ movie.poster.url }}" class="img-fluid poster w-100">
                {% else %}
                <img src="https://via.placeholder.com/400x600?text=No+Poster" class="img-fluid poster w-100">
                {% endif %}
            </div>
            
            <div class="col-md-7 col-lg-8 px-md-5">
                <h1 class="movie-title">{{ movie.title }}</h1>
                
                <div class="metadata">
                    <span><i class="fa-solid fa-calendar-day"></i> {{ movie.release_date|date:"F j, Y" }}</span>
                    <span><i class="fa-regular fa-clock"></i> {{ movie.duration }} Minutes</span>
                </div>
                
                <div class="synopsis-box">
                    <h5 class="text-white mb-3 fw-bold">Synopsis</h5>
                    <p class="mb-0">{{ movie.description }}</p>
                </div>
                
                <div class="mt-4">
                    <a href="{% url 'theatre_list' movie.id %}" class="btn btn-book">
                        <i class="fa-solid fa-popcorn"></i> Select Theatre & Book
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
