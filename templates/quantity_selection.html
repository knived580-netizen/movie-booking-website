<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Quantity | {{ show.movie.title }}</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0d0d0f;
            --text-color: #ffffff;
            --accent-red: #E50914;
            --accent-hover: #b8050e;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Glassmorphic Navbar */
        .navbar-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand { font-weight: 800; font-size: 26px; letter-spacing: 1px; color: #fff !important; display: flex; align-items: center; gap: 10px; }
        .navbar-brand i { color: var(--accent-red); }

        /* Detail Card container */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .booking-card {
            background: #15151a;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .card-header-icon {
            font-size: 3rem;
            color: var(--accent-red);
            text-align: center;
            margin-bottom: 15px;
        }

        .booking-title { font-weight: 800; font-size: 1.8rem; text-align: center; margin-bottom: 25px; }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 1.05rem;
        }
        .info-row span.label { color: #888; }
        .info-row span.value { font-weight: 600; text-align: right; }

        /* Quantity Selector UI */
        .qty-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 35px 0;
        }

        .btn-qty {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-qty:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .btn-qty:active { transform: scale(0.95); }

        #qty-display {
            font-size: 3rem;
            font-weight: 800;
            width: 60px;
            text-align: center;
            color: var(--accent-red);
        }

        /* Hidden Input */
        select[name="quantity"] { display: none; }

        .btn-proceed {
            background-color: var(--accent-red);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            width: 100%;
            display: block;
            text-align: center;
            text-decoration: none;
        }
        .btn-proceed:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(229, 9, 20, 0.4);
            color: #fff;
        }

        .btn-back { color: #aaa; text-decoration: none; display: inline-block; margin-bottom: 20px; transition: 0.2s; }
        .btn-back:hover { color: #fff; transform: translateX(-5px); }

    </style>
</head>
<body>

    <!-- Transparent Navbar -->
    <nav class="navbar navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fa-solid fa-ticket"></i> CineBook
            </a>
        </div>
    </nav>

    <div class="main-container container mt-4">
        
        <div class="w-100" style="max-width: 500px;">
            <a href="{% url 'theatre_list' show.movie.id %}" class="btn-back"><i class="fa-solid fa-arrow-left mt-2"></i> Choose a different theatre</a>

            <div class="booking-card">
                <div class="card-header-icon"><i class="fa-solid fa-users-viewfinder"></i></div>
                <h3 class="booking-title">How many tickets?</h3>
                
                {% if error %}
                <div class="alert alert-danger" style="background: rgba(220, 53, 69, 0.1); border: 1px solid rgba(220, 53, 69, 0.3); color: #ff6b7a; border-radius: 8px; padding: 10px; margin-bottom: 20px;">
                    <i class="fa-solid fa-exclamation-triangle me-2"></i>{{ error }}
                </div>
                {% endif %}
                
                <div class="info-row">
                    <span class="label">Movie</span>
                    <span class="value">{{ show.movie.title }}</span>
                </div>
                <div class="info-row">
                    <span class="label">Theatre</span>
                    <span class="value">{{ show.theatre.name }}</span>
                </div>
                <div class="info-row border-0">
                    <span class="label">Time</span>
                    <span class="value text-accent">{{ show.show_time|time:"h:i A" }}</span>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="qty-container">
                        <button type="button" class="btn-qty" id="btn-minus"><i class="fa-solid fa-minus"></i></button>
                        <div id="qty-display">1</div>
                        <button type="button" class="btn-qty" id="btn-plus"><i class="fa-solid fa-plus"></i></button>
                    </div>

                    <!-- Hidden actual submit value -->
                    <select name="quantity" id="quantity-select">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>

                    <button type="submit" class="btn-proceed mt-3">
                        Choose Seats <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </form>

            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnMinus = document.getElementById('btn-minus');
            const btnPlus = document.getElementById('btn-plus');
            const qtyDisplay = document.getElementById('qty-display');
            const hiddenSelect = document.getElementById('quantity-select');

            let currentVal = 1;

            btnMinus.addEventListener('click', () => {
                if (currentVal > 1) {
                    currentVal--;
                    updateUI();
                }
            });

            btnPlus.addEventListener('click', () => {
                if (currentVal < 10) {
                    currentVal++;
                    updateUI();
                }
            });

            function updateUI() {
                qtyDisplay.textContent = currentVal;
                hiddenSelect.value = currentVal;
            }
        });
    </script>
</body>
</html>
