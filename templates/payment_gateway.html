<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway | MovieBooking</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0d0d0f;
            --text-color: #ffffff;
            --accent-red: #E50914;
            --accent-green: #10B981;
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            margin-bottom: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
        }

        /* Glassmorphic Navbar */
        .navbar-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-brand { font-weight: 800; font-size: 26px; letter-spacing: 1px; color: #fff !important; display: flex; align-items: center; gap: 10px; }
        .navbar-brand i { color: var(--accent-red); }

        .payment-card {
            background: #15151a;
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-top: 80px;
        }

        /* Gradient top border effect */
        .payment-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-red), #ff5555);
        }

        .payment-h2 { font-weight: 800; font-size: 1.8rem; margin-bottom: 5px; }
        .payment-sub { color: #888; font-size: 1rem; margin-bottom: 25px; }

        .amount-display {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .qr-wrapper {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.05);
            border: 4px solid rgba(255,255,255,0.8);
        }

        .instruction-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .btn-success-premium {
            background-color: var(--accent-green);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            width: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-success-premium:hover {
            background-color: #0ea171;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
            color: #fff;
        }

    </style>
</head>
<body>

    <!-- Transparent Navbar -->
    <nav class="navbar navbar-glass">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">
                <i class="fa-solid fa-ticket"></i> CineBook
            </a>
        </div>
    </nav>

    <div class="container px-3 d-flex justify-content-center">
        <div class="payment-card">
            
            <h2 class="payment-h2">Secure Checkout</h2>
            <p class="payment-sub">Scan to pay for {{ booking.show.movie.title }}</p>
            
            <div class="amount-display">
                ₹{{ booking.amount_paid|floatformat:2 }}
            </div>

            <div class="qr-wrapper">
                <img src="data:image/png;base64,{{ qr_code_base64 }}" alt="UPI QR Code" class="img-fluid" style="width: 200px; height: 200px;">
            </div>

            <div class="instruction-box">
                <i class="fa-brands fa-google-pay fs-4 mb-2 text-white"></i>
                <br>
                Open Google Pay, PhonePe, or any UPI app to scan this QR code. It is pre-configured with the precise amount.
            </div>

            <form method="post" action="{% url 'process_payment' booking.ticket_id %}">
                {% csrf_token %}
                <button type="submit" class="btn-success-premium">
                    Simulate Payment Successful <i class="fa-solid fa-check-circle ms-1"></i>
                </button>
            </form>
        </div>
    </div>

</body>
</html>
